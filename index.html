<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <title data-i18n-attr="textContent:meta.title">
    SHCĐ Tháng 5 · Tự soi, Tự sửa — Đảng viên sinh viên rèn đức, luyện tài
  </title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="animations.css" />
  <script src="deck-stage.js"></script>
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
    }

    .quiz-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .quiz-opt {
      all: unset;
      cursor: pointer;
      display: flex;
      align-items: stretch;
      background: var(--white);
      border: 2px solid var(--ink);
      min-height: 160px;
      transition:
        transform 0.2s,
        box-shadow 0.2s;
    }

    .quiz-opt .qbadge {
      width: 120px;
      background: var(--ink);
      color: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-serif);
      font-weight: 900;
      font-size: 68px;
    }

    .quiz-opt .qbody {
      flex: 1;
      padding: 24px 30px;
      display: flex;
      align-items: center;
      font-family: var(--font-sans);
      font-size: 32px;
      font-weight: 600;
      line-height: 1.3;
    }

    .quiz-opt .qicon {
      width: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .quiz-slide .mono-tag {
      font-size: 34px !important;
      letter-spacing: 0.1em !important;
    }

    .quiz-slide h2.title-md {
      font-size: clamp(46px, 2.6vw, 54px) !important;
      line-height: 1.14 !important;
      max-width: 100% !important;
      text-wrap: pretty;
    }

    .quiz-slide p.body {
      font-size: 32px !important;
      line-height: 1.35 !important;
    }
  </style>
</head>

<body>
  <deck-stage>
    <!-- ====== 01 COVER ====== -->
    <section data-screen-label="01 Cover" data-i18n-attr="data-screen-label:screenLabels.cover"
      style="background: var(--red); color: var(--white); padding: 0">
      <div class="anim anim-bar" style="
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 24px;
            background: var(--gold);
          "></div>
      <div class="anim anim-bar-r d-1" style="
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 24px;
            background: var(--gold);
          "></div>
      <div class="loop-spin" style="
            position: absolute;
            right: -180px;
            top: -180px;
            width: 900px;
            height: 900px;
            opacity: 0.13;
          ">
        <div style="
              width: 100%;
              height: 100%;
              background: var(--gold);
              clip-path: polygon(
                50% 0%,
                61% 35%,
                98% 35%,
                68% 57%,
                79% 91%,
                50% 70%,
                21% 91%,
                32% 57%,
                2% 35%,
                39% 35%
              );
            "></div>
      </div>

      <div class="anim anim-fade-down d-2" style="
            position: absolute;
            top: 64px;
            left: 120px;
            right: 120px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.85;
          ">
        <span data-i18n="cover.topLeft"></span>
        <span data-i18n="cover.topRight"></span>
      </div>

      <div style="
            padding: 240px 120px 140px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
          ">
        <div class="anim anim-fade-up d-3" style="
              display: flex;
              align-items: center;
              gap: 24px;
              margin-bottom: 40px;
            ">
          <div class="loop-pulse" style="
                width: 48px;
                height: 48px;
                background: var(--gold);
                clip-path: polygon(
                  50% 0%,
                  61% 35%,
                  98% 35%,
                  68% 57%,
                  79% 91%,
                  50% 70%,
                  21% 91%,
                  32% 57%,
                  2% 35%,
                  39% 35%
                );
              "></div>
          <div data-i18n="cover.badge" style="
                font-size: 22px;
                font-weight: 600;
                letter-spacing: 0.32em;
                text-transform: uppercase;
                color: var(--gold);
              "></div>
        </div>

        <h1 class="anim anim-fade-up d-4" data-i18n-html="cover.titleHtml" style="
              font-family: var(--font-serif);
              font-weight: 900;
              font-size: 200px;
              line-height: 0.9;
              letter-spacing: -0.025em;
              margin: 0;
              max-width: 1500px;
            "></h1>

        <div class="anim anim-fade-up d-7" style="
              margin-top: 64px;
              display: flex;
              gap: 80px;
              align-items: flex-end;
            ">
          <div data-i18n-html="cover.introHtml" style="
                font-size: 28px;
                line-height: 1.4;
                max-width: 820px;
                opacity: 0.92;
              "></div>
          <div data-i18n-html="cover.mottoHtml" style="
                margin-left: auto;
                text-align: right;
                font-family: var(--font-serif);
                font-style: italic;
                font-size: 30px;
                opacity: 0.78;
              "></div>
        </div>
      </div>
    </section>

    <!-- ====== 02 AGENDA ====== -->

        <div style="
              display: grid;
              grid-template-columns: 1fr 1fr 1fr 1fr;
              gap: 24px;
            ">
          <div style="
                border: 2px solid var(--ink);
                padding: 32px;
                position: relative;
                background: var(--white);
              ">
            <div style="
                  position: absolute;
                  top: -2px;
                  left: -2px;
                  right: -2px;
                  height: 8px;
                  background: var(--gold);
                "></div>
            <div class="mono-tag" data-i18n="agenda.cards.part0.tag"
              style="color: var(--red); font-weight: 700; margin-bottom: 8px"></div>
            <div class="mono-tag" data-i18n="agenda.cards.part0.duration" style="opacity: 0.5; margin-bottom: 20px">
            </div>
            <h3 class="title-md" data-i18n="agenda.cards.part0.title" style="margin: 0 0 12px; font-size: 34px"></h3>
            <p class="body" data-i18n="agenda.cards.part0.desc" style="margin: 0; opacity: 0.75; font-size: 21px"></p>
          </div>

          <div style="
                border: 2px solid var(--ink);
                padding: 32px;
                position: relative;
                background: var(--white);
              ">
            <div style="
                  position: absolute;
                  top: -2px;
                  left: -2px;
                  right: -2px;
                  height: 8px;
                  background: var(--red);
                "></div>
            <div class="mono-tag" data-i18n="agenda.cards.activity1.tag"
              style="color: var(--red); font-weight: 700; margin-bottom: 8px"></div>
            <div class="mono-tag" data-i18n="agenda.cards.activity1.duration" style="opacity: 0.5; margin-bottom: 20px">
            </div>
            <h3 class="title-md" data-i18n="agenda.cards.activity1.title" style="margin: 0 0 12px; font-size: 34px">
            </h3>
            <p class="body" data-i18n="agenda.cards.activity1.desc" style="margin: 0; opacity: 0.75; font-size: 21px">
            </p>
          </div>

          <div style="
                border: 2px solid var(--ink);
                padding: 32px;
                position: relative;
                background: var(--white);
              ">
            <div style="
                  position: absolute;
                  top: -2px;
                  left: -2px;
                  right: -2px;
                  height: 8px;
                  background: var(--gold);
                "></div>
            <div class="mono-tag" data-i18n="agenda.cards.activity2.tag"
              style="color: var(--red); font-weight: 700; margin-bottom: 8px"></div>
            <div class="mono-tag" data-i18n="agenda.cards.activity2.duration" style="opacity: 0.5; margin-bottom: 20px">
            </div>
            <h3 class="title-md" data-i18n="agenda.cards.activity2.title" style="margin: 0 0 12px; font-size: 34px">
            </h3>
            <p class="body" data-i18n="agenda.cards.activity2.desc" style="margin: 0; opacity: 0.75; font-size: 21px">
            </p>
          </div>

          <div style="
                border: 2px solid var(--ink);
                padding: 32px;
                position: relative;
                background: var(--ink);
                color: var(--white);
              ">
            <div style="
                  position: absolute;
                  top: -2px;
                  left: -2px;
                  right: -2px;
                  height: 8px;
                  background: var(--gold);
                "></div>
            <div class="mono-tag" data-i18n="agenda.cards.activity3.tag"
              style="color: var(--gold); font-weight: 700; margin-bottom: 8px"></div>
            <div class="mono-tag" data-i18n="agenda.cards.activity3.duration" style="opacity: 0.5; margin-bottom: 20px">
            </div>
            <h3 class="title-md" data-i18n="agenda.cards.activity3.title" style="margin: 0 0 12px; font-size: 34px">
            </h3>
            <p class="body" data-i18n="agenda.cards.activity3.desc" style="margin: 0; opacity: 0.85; font-size: 21px">
            </p>
          </div>
        </div>

        <div style="
              margin-top: 48px;
              padding: 32px;
              background: var(--ink);
              color: var(--white);
              display: flex;
              align-items: center;
              gap: 32px;
            ">
          <div style="
                width: 48px;
                height: 48px;
                background: var(--gold);
                flex-shrink: 0;
                clip-path: polygon(
                  50% 0%,
                  61% 35%,
                  98% 35%,
                  68% 57%,
                  79% 91%,
                  50% 70%,
                  21% 91%,
                  32% 57%,
                  2% 35%,
                  39% 35%
                );
              "></div>
          <div data-i18n="agenda.quote" style="
                font-family: var(--font-serif);
                font-style: italic;
                font-size: 32px;
                flex: 1;
              "></div>
          <div class="mono-tag" data-i18n="agenda.quoteTag" style="color: var(--gold); opacity: 0.8"></div>
        </div>
      </div>
    </section>

    <!-- ====== 03 KHỞI ĐỘNG TITLE / LUẬT CHƠI ====== -->
    <section data-screen-label="03 Khoi dong - Luat choi" data-i18n-attr="data-screen-label:screenLabels.khoidongRules"
      style="background: var(--ink); color: var(--white)">
      <div style="
            position: absolute;
            top: 0;
            left: 0;
            width: 24px;
            height: 100%;
            background: var(--gold);
          "></div>
      <div style="
            position: absolute;
            top: 0;
            right: 0;
            width: 24px;
            height: 100%;
            background: var(--red);
          "></div>

      <div class="chrome-corner tl" data-i18n="khoidong.cornerLeft" style="color: var(--gold); opacity: 1; left: 96px">
      </div>
      <div class="chrome-corner tr" data-i18n="khoidong.cornerRight"
        style="color: var(--white); opacity: 0.6; right: 96px"></div>

      <div class="slide-pad" style="justify-content: center">
        <div style="
              display: grid;
              grid-template-columns: 6fr 5fr;
              gap: 96px;
              align-items: center;
            ">
          <div>
            <div class="eyebrow" data-i18n="khoidong.eyebrow" style="color: var(--gold); margin-bottom: 32px"></div>
            <h1 class="title-display" data-i18n-html="khoidong.titleHtml" style="color: var(--white); margin: 0 0 48px">
            </h1>
            <div class="body-lg" data-i18n-html="khoidong.descHtml" style="max-width: 800px; opacity: 0.85"></div>
          </div>

          <div style="display: flex; flex-direction: column; gap: 20px">
            <div style="
                  background: rgba(255, 255, 255, 0.06);
                  border: 1px solid rgba(255, 210, 0, 0.3);
                  padding: 28px;
                  display: flex;
                  gap: 24px;
                  align-items: center;
                ">
              <div data-i18n="khoidong.stats.teamCount.value" style="
                    font-family: var(--font-serif);
                    font-weight: 900;
                    font-size: 64px;
                    color: var(--gold);
                    line-height: 1;
                    min-width: 70px;
                  "></div>
              <div>
                <div class="mono-tag" data-i18n="khoidong.stats.teamCount.label"
                  style="color: var(--gold); font-weight: 700"></div>
                <div class="body" data-i18n="khoidong.stats.teamCount.desc" style="opacity: 0.85; margin-top: 4px">
                </div>
              </div>
            </div>
            <div style="
                  background: rgba(255, 255, 255, 0.06);
                  border: 1px solid rgba(255, 210, 0, 0.3);
                  padding: 28px;
                  display: flex;
                  gap: 24px;
                  align-items: center;
                ">
              <div data-i18n="khoidong.stats.questionCount.value" style="
                    font-family: var(--font-serif);
                    font-weight: 900;
                    font-size: 64px;
                    color: var(--gold);
                    line-height: 1;
                    min-width: 70px;
                  "></div>
              <div>
                <div class="mono-tag" data-i18n="khoidong.stats.questionCount.label"
                  style="color: var(--gold); font-weight: 700"></div>
                <div class="body" data-i18n="khoidong.stats.questionCount.desc" style="opacity: 0.85; margin-top: 4px">
                </div>
              </div>
            </div>
            <div style="
                  background: rgba(255, 210, 0, 0.12);
                  border: 1px solid var(--gold);
                  padding: 28px;
                  display: flex;
                  gap: 24px;
                  align-items: center;
                ">
              <div data-i18n="khoidong.stats.points.value" style="
                    font-family: var(--font-serif);
                    font-weight: 900;
                    font-size: 64px;
                    color: var(--gold);
                    line-height: 1;
                    min-width: 70px;
                  "></div>
              <div>
                <div class="mono-tag" data-i18n="khoidong.stats.points.label"
                  style="color: var(--gold); font-weight: 700"></div>
                <div class="body" data-i18n="khoidong.stats.points.desc" style="opacity: 0.85; margin-top: 4px"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ====== 04–10 7 CÂU HỎI KHỞI ĐỘNG ====== -->
    <!-- Các slide câu hỏi được load động từ uploads/khoidong.json thông qua quiz.js -->

    <!-- ====== 11 KHỞI ĐỘNG TỔNG KẾT ====== -->
    <section id="khoidong-tongket" data-screen-label="11 Khoi dong - Tong ket"
      data-i18n-attr="data-screen-label:screenLabels.khoidongSummary" style="background: var(--paper)">
      <div class="chrome-corner tl" data-i18n="khoidongSummary.cornerLeft"></div>
      <div class="chrome-corner tr" data-i18n="khoidongSummary.cornerRight"></div>

      <div class="slide-pad">
        <div class="eyebrow" data-i18n="khoidongSummary.eyebrow" style="margin-bottom: 24px"></div>
        <h2 class="title-xl" data-i18n-html="khoidongSummary.titleHtml" style="margin: 0 0 56px; max-width: 1500px">
        </h2>

        <div style="
              display: grid;
              grid-template-columns: repeat(3, 1fr);
              gap: 32px;
              margin-bottom: 48px;
            ">
          <div style="
                background: var(--white);
                border: 2px solid var(--ink);
                padding: 32px;
              ">
            <div class="mono-tag" data-i18n="khoidongSummary.cards.card1.tag"
              style="color: var(--red); font-weight: 700; margin-bottom: 12px"></div>

              style="margin: 0 0 12px; font-size: 32px"></h3>
            <p class="body" data-i18n="khoidongSummary.cards.card1.desc"
              style="margin: 0; opacity: 0.75; font-size: 22px"></p>
          </div>
          <div style="
                background: var(--white);
                border: 2px solid var(--ink);
                padding: 32px;
              ">
            <div class="mono-tag" data-i18n="khoidongSummary.cards.card2.tag"
              style="color: var(--red); font-weight: 700; margin-bottom: 12px"></div>
            <h3 class="title-md" data-i18n="khoidongSummary.cards.card2.title"
              style="margin: 0 0 12px; font-size: 32px"></h3>

          <div style="background: var(--ink); color: var(--white); padding: 32px">
            <div class="mono-tag" data-i18n="khoidongSummary.cards.card3.tag" style="
                  color: var(--gold);

                  margin-bottom: 12px;

            <h3 class="title-md" data-i18n="khoidongSummary.cards.card3.title"
              style="margin: 0 0 12px; font-size: 32px; color: var(--gold)"></h3>

              style="margin: 0; opacity: 0.85; font-size: 22px"></p>

              display: flex;
              align-items: center;

      <div style="

    <!-- ====== 13 HD1 TỔNG QUAN + LUẬT DIXIT ====== -->
    <section data-screen-label="13 HD1 Tong quan" data-i18n-attr="data-screen-label:screenLabels.hd1Overview">
      <div class="chrome-corner tl" data-i18n="hd1.overview.cornerLeft"></div>
      <div class="chrome-corner tr" data-i18n="hd1.overview.cornerRight"></div>
      <div style="
            position: absolute;
            top: 0;
            right: 0;
            width: 24px;
            height: 100%;
            background: var(--red);
          "></div>

      <div class="slide-pad">
        <div class="eyebrow" data-i18n="hd1.overview.eyebrow" style="margin-bottom: 24px"></div>
        <h2 class="title-xl" data-i18n-html="hd1.overview.titleHtml" style="margin: 0 0 56px; max-width: 1500px"></h2>

        <div style="
              display: grid;
              grid-template-columns: 1fr 1fr;
              gap: 48px;
              flex: 1;
            ">
          <div style="border-top: 4px solid var(--ink); padding-top: 28px">

            <div class="mono-tag" data-i18n="hd1.overview.card2.tag"

                padding: 32px 40px;
                display: grid;
                grid-template-columns: repeat(4, 1fr);

            <div>
              <div style="
                    font-family: var(--font-serif);
                    font-weight: 900;
                    font-size: 64px;
                    line-height: 1;

              <div class="body" data-i18n="hd1.overview.stats.teams.label" style="opacity: 0.85; margin-top: 8px"></div>
            </div>
            <div>
              <div style="

                  <div data-i18n="hd3.criteria.committee.items.item7.note" style="opacity: 0.6; font-size: 15px"></div>
                </div>
                <div style="
                      font-family: var(--font-serif);
                      font-weight: 900;
                      font-size: 32px;
                      color: var(--red);
                    ">
                  10đ
                </div>
              </div>
            </div>
          </div>

          <!-- Audience -->
          <div style="display: flex; flex-direction: column; gap: 24px">
            <div style="
                  background: var(--ink);
                  color: var(--white);
                  padding: 32px;
                ">
              <div class="mono-tag" data-i18n="hd3.criteria.audience.tag" style="
                    color: var(--gold);
                    font-weight: 700;
                    margin-bottom: 14px;
                  "></div>
              <h3 data-i18n="hd3.criteria.audience.title" style="
                    margin: 0 0 16px;
                    font-size: 32px;
                    font-weight: 700;
                    color: var(--gold);
                  "></h3>
              <p class="body" data-i18n="hd3.criteria.audience.desc"
                style="margin: 0 0 20px; opacity: 0.85; font-size: 20px"></p>
              <div style="
                    padding: 16px 20px;
                    background: rgba(255, 210, 0, 0.12);
                    border-left: 4px solid var(--gold);
                    font-family: &quot;JetBrains Mono&quot;, monospace;
                    font-size: 16px;
                    line-height: 1.6;
                  ">
                <span data-i18n="hd3.criteria.audience.formula"></span>
              </div>
            </div>

            <div style="
                  background: var(--gold);
                  padding: 32px;
                  flex: 1;
                  display: flex;
                  flex-direction: column;
                  justify-content: center;
                ">
              <div class="mono-tag" data-i18n="hd3.criteria.total.tag" style="font-weight: 700; margin-bottom: 12px">
              </div>
              <div data-i18n="hd3.criteria.total.points" style="
                    font-family: var(--font-serif);
                    font-weight: 900;
                    font-size: 84px;
                    line-height: 1;
                    color: var(--ink);
                  "></div>
              <p class="body" data-i18n-html="hd3.criteria.total.descHtml"
                style="margin: 12px 0 0; font-size: 21px; line-height: 1.4"></p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ====== 34 HD3 QR BÌNH CHỌN ====== -->
    <section data-screen-label="34 HD3 QR Binh chon" data-i18n-attr="data-screen-label:screenLabels.hd3Vote">
      <div class="chrome-corner tl" data-i18n="hd3.vote.cornerLeft"></div>

      <div class="slide-pad" style="
            padding: 96px 120px;
            flex-direction: row;
            gap: 96px;
            align-items: center;
          ">
        <div style="flex: 1">
          <div class="eyebrow" data-i18n="hd3.vote.eyebrow" style="margin-bottom: 32px"></div>
          <h2 class="title-xl" data-i18n-html="hd3.vote.titleHtml" style="margin: 0 0 32px"></h2>
          <p class="body-lg" data-i18n-html="hd3.vote.descHtml"
            style="opacity: 0.78; margin: 0 0 40px; max-width: 600px"></p>
          <div style="
                display: flex;
                gap: 24px;
                align-items: center;
                padding-top: 24px;
                border-top: 2px solid var(--ink);
              ">
            <div data-i18n="hd3.vote.urlLabel" style="
                  font-family: &quot;JetBrains Mono&quot;, monospace;
                  font-size: 14px;
                  letter-spacing: 0.15em;
                  opacity: 0.6;
                "></div>
            <div data-i18n="hd3.vote.urlValue" style="
                  font-family: &quot;JetBrains Mono&quot;, monospace;
                  font-size: 22px;
                  font-weight: 600;
                "></div>
          </div>
        </div>

        <div style="
              flex: 1;
              display: flex;
              flex-direction: column;
              align-items: center;
            ">
          <div style="
                background: var(--white);
                border: 2px solid var(--ink);
                padding: 48px;
                position: relative;
              ">
            <div style="
                  position: absolute;
                  top: -2px;
                  left: -2px;
                  right: -2px;
                  height: 8px;
                  background: var(--gold);
                "></div>
            <div id="qr-target" style="
                  width: 480px;
                  height: 480px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                "></div>
            <div style="margin-top: 20px; text-align: center">
              <div class="mono-tag" data-i18n="hd3.vote.qrTag" style="color: var(--red); font-weight: 700"></div>
              <div class="body" data-i18n="hd3.vote.qrHint" style="margin-top: 4px; opacity: 0.6; font-size: 17px">
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ====== 35 CLOSING ====== -->
    <section data-screen-label="35 Closing" data-i18n-attr="data-screen-label:screenLabels.closing"
      style="background: var(--red); color: var(--white)">
      <div style="
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 24px;
            background: var(--gold);
          "></div>
      <div style="
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 24px;
            background: var(--gold);
          "></div>

      <div style="
            position: absolute;
            right: -200px;
            top: 50%;
            transform: translateY(-50%);
            width: 1000px;
            height: 1000px;
            opacity: 0.12;
          ">
        <div style="
              width: 100%;
              height: 100%;
              background: var(--gold);
              clip-path: polygon(
                50% 0%,
                61% 35%,
                98% 35%,
                68% 57%,
                79% 91%,
                50% 70%,
                21% 91%,
                32% 57%,
                2% 35%,
                39% 35%
              );
            "></div>
      </div>

      <div class="slide-pad" style="justify-content: center">
        <div class="eyebrow" data-i18n="closing.eyebrow" style="color: var(--gold); margin-bottom: 32px"></div>
        <h1 class="title-display" data-i18n-html="closing.titleHtml" style="color: var(--white); margin: 0"></h1>
        <div style="
              margin-top: 64px;
              padding-top: 32px;
              border-top: 2px solid rgba(255, 255, 255, 0.3);
              display: flex;
              justify-content: space-between;
              align-items: flex-end;
            ">
          <div>
            <div class="mono-tag" data-i18n="closing.meta" style="color: var(--gold); margin-bottom: 8px"></div>
            <div data-i18n="closing.subtitle" style="
                  font-family: var(--font-serif);
                  font-style: italic;
                  font-size: 28px;
                  opacity: 0.92;
                "></div>
          </div>
          <div style="display: flex; align-items: center; gap: 16px">
            <div style="
                  width: 32px;
                  height: 32px;
                  background: var(--gold);
                  clip-path: polygon(
                    50% 0%,
                    61% 35%,
                    98% 35%,
                    68% 57%,
                    79% 91%,
                    50% 70%,
                    21% 91%,
                    32% 57%,
                    2% 35%,
                    39% 35%
                  );
                "></div>
            <div data-i18n="closing.end" style="
                  font-family: var(--font-serif);
                  font-style: italic;
                  font-size: 22px;
                  opacity: 0.8;
                "></div>
          </div>
        </div>
      </div>
    </section>
  </deck-stage>

  <script src="steps.js"></script>
  <script src="auto-anim.js"></script>
  <script src="content-loader.js"></script>
  <script src="quiz.js"></script>
  <script src="dixit.js"></script>
  <script src="feud.js"></script>
  <script src="timers.js"></script>
  <script src="qr.js"></script>
</body>

</html>
